```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoseSweets | دخول الإدارة</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center">
        <div class="w-20 h-20 bg-pink-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i data-lucide="shield-check" class="text-pink-500 w-10 h-10"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">دخول الإدارة 👑</h2>
        <p class="text-gray-500 text-sm mb-8">يسمح فقط لإدارة حلويات بوسي بالدخول</p>
        
        <div class="space-y-4">
            <input type="email" id="admin-email" placeholder="البريد الإلكتروني" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-pink-500 font-bold transition-all">
            <input type="password" id="admin-pwd" placeholder="كلمة المرور السحابية" class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:border-pink-500 font-bold transition-all">
            <button onclick="loginAdmin()" id="login-btn" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-pink-600 active:scale-95 transition-all">دخول النظام</button>
        </div>
        <a href="index.html" class="block mt-6 text-gray-400 text-sm font-bold hover:text-gray-600 transition-colors">العودة للمتجر</a>
    </div>

    <script>
        lucide.createIcons();
        async function loginAdmin() {
            const email = document.getElementById('admin-email').value;
            const pwd = document.getElementById('admin-pwd').value;
            const btn = document.getElementById('login-btn');
            
            if(!email || !pwd) { alert("اكتبي بيانات الدخول يا إدارة 🌸"); return; }
            
            btn.innerText = "جاري التحقق... ⏳"; btn.disabled = true;
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
                window.location.href = 'admin.html';
            } catch (error) {
                alert("بيانات الدخول غير صحيحة! تم تسجيل المحاولة 🛡️");
                btn.innerText = "دخول النظام"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>

### 4. تعديل ملف admin.html (القفل النهائي)
افتحي ملف admin.html وتأكدي أن الـ Scripts في النهاية تستدعي ملف الإعدادات بدلاً من الأكواد المكررة.
**استبدلي كود الـ <script> الأخير في admin.html بهذا الكود الذكي:**
```javascript
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
    <script src="gallery.js"></script>
    <script src="admin.js"></script>
    
    <script>
        // 🛡️ درع الحماية السحابي: التأكد من هوية الأدمن قبل عرض أي بيانات
        auth.onAuthStateChanged(user => {
            if (user) {
                // الأدمن مسجل دخوله.. شغّل اللوحة
                window.onload = async () => {
                    await loadEngineMemory(); 
                    openAdminDashboardDirectly(); 
                };
            } else {
                // شخص مجهول يحاول الدخول.. اطرده لصفحة الدخول
                window.location.href = 'login.html';
            }
        });
    </script>
